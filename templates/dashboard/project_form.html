{% extends 'dashboard/base_dashboard.html' %}
{% block title %}{{ action }} Project{% endblock %}
{% block page_title %}{{ action }} Project{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px;">
  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-grid">

      <div class="form-group full">
        <label>Project Title *</label>
        <input type="text" name="title" value="{{ project.title|default:'' }}" placeholder="e.g. Portfolio Website" required>
      </div>

      <div class="form-group full">
        <label>Description *</label>
        <textarea name="description" placeholder="What does this project do? What problem does it solve?">{{ project.description|default:'' }}</textarea>
      </div>

      <div class="form-group">
        <label>GitHub URL *</label>
        <input type="url" name="github_url" value="{{ project.github_url|default:'' }}" placeholder="https://github.com/you/project">
      </div>

      <div class="form-group">
        <label>Live URL (optional)</label>
        <input type="url" name="live_url" value="{{ project.live_url|default:'' }}" placeholder="https://yourproject.com">
      </div>

      <div class="form-group full">
        <label>Tags * (comma-separated)</label>
        <input type="text" name="tags" value="{{ project.tags|default:'' }}" placeholder="Python, Django, HTML, CSS">
      </div>

      <div class="form-group">
        <label>Display Order</label>
        <input type="number" name="order" value="{{ project.order|default:0 }}" min="0">
      </div>

      <div class="form-group" style="display: flex; align-items: center; padding-top: 28px;">
        <div class="form-check">
          <input type="checkbox" name="featured" id="featured" {% if project.featured %}checked{% endif %}>
          <label for="featured">Show on home page (Featured)</label>
        </div>
      </div>

      <div class="form-group full">
        <label>Project Screenshot</label>
        <input type="file" name="image" accept="image/*">
        {% if project.image %}
        <div class="current-image">
          <p>Current image:</p>
          <img src="{{ project.image.url }}" alt="Current">
        </div>
        {% endif %}
      </div>

    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-accent">{{ action }} Project</button>
      <a href="{% url 'dashboard_projects' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
