{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — KE Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --bg-card: #111; --border: #222; --border-bright: #2e2e2e;
      --text: #e8e8e0; --text-muted: #888880; --text-faint: #444440;
      --accent: #c8f060; --accent-glow: rgba(200,240,96,0.12);
      --red: #ff6b6b; --mono: 'Fragment Mono', monospace; --sans: 'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box {
      width: 100%; max-width: 400px; padding: 24px;
    }
    .login-logo {
      font-family: var(--mono); font-size: 1.8rem; font-weight: 700;
      text-align: center; margin-bottom: 8px;
    }
    .login-logo span { color: var(--accent); }
    .login-sub { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 36px; font-family: var(--mono); }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
      box-shadow: 0 0 40px var(--accent-glow);
    }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 8px; }
    .form-group input {
      width: 100%; background: #161616; border: 1px solid var(--border-bright);
      border-radius: 8px; color: var(--text); font-family: var(--sans);
      font-size: 0.95rem; padding: 11px 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%; background: var(--accent); color: #0a0a0a; border: 2px solid var(--accent);
      border-radius: 8px; font-family: var(--sans); font-weight: 600; font-size: 0.95rem;
      padding: 12px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .btn-login:hover { background: transparent; color: var(--accent); }
    .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; border: 1px solid var(--red); color: var(--red); background: rgba(255,107,107,0.08); }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.82rem; color: var(--text-muted); }
    .back-link a { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">KE<span>.</span>admin</div>
  <div class="login-sub">Portfolio Dashboard</div>
  <div class="login-card">
    {% if messages %}
      {% for message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your username" autofocus required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Enter Dashboard →</button>
    </form>
  </div>
  <div class="back-link"><a href="{% url 'home' %}">← Back to portfolio</a></div>
</div>
</body>
</html>
